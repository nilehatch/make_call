name: Publish to Netlify

# Deploy the book to Netlify on every push to main.
#
# The book contains R figure chunks, but this workflow never installs R:
# execute.freeze is `true` in _quarto.yml, so a project render uses the
# committed _freeze/ results instead of re-executing. To refresh a figure,
# render that single .qmd locally (a single-file render always executes),
# then commit the updated _freeze/.
#
# Requires one repo secret: NETLIFY_AUTH_TOKEN (a Netlify personal access
# token). The target site is pinned in _publish.yml.
#
# NOTE: NETLIFY_AUTH_TOKEN MUST be set at JOB level (below), not on the
# publish step. quarto-actions/publish is a composite action, and a token
# set only on the step does not propagate into its internal steps — the
# Netlify deploy then silently skips while the job still reports success.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render and publish to Netlify
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: netlify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
