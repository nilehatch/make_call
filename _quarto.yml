project:
  type: book
  output-dir: _book
  pre-render:
    - scripts/sync-refs.py

book:
  title: "Make the Call"
  subtitle: "Knowing what you know, learning what you can, and acting under uncertainty in entrepreneurship"
  reader-mode: true

#  author: "Nile Hatch"
#  date: "9/4/2025"

  site-url: https://mc.nilehatch.com/
  repo-url: https://github.com/nilehatch/make_call/

  page-footer:
    left: |
      _Make the Call_ is written by Nile Hatch.
    right: |
      Built with <a href="https://quarto.org/">Quarto</a>.

  sidebar:
    style: "docked"
    collapse-level: 1

  chapters:
    - index.qmd
    - intro.qmd

    - part: "Into the Fog"
      chapters:
        - uncertainty.qmd
        - ways-of-knowing.qmd
        - why-the-fog-hurts.qmd
        - the-loop.qmd

    - part: "The Frame Gate"
      chapters:
        - urgent-unknowns.qmd
        - exploring.qmd
        - hypothesizing.qmd

    - part: "The Prior Gate"
      chapters:
        - prior-you-have-one.qmd
        - prior-why-it-matters.qmd
        - seeing-probability.qmd
        - priors-small-world.qmd

    - part: "The Evidence Gate"
      chapters:
        - evidence-enough.qmd
        - gathering-whats-known.qmd
        - designing-the-experiment.qmd
        - seeing-in-depth.qmd

    - part: "The Sense Gate"
      chapters:
        - weighing-the-evidence.qmd
        - moving-your-belief.qmd
        - when-the-frame-cracks.qmd

    - part: "The Call Gate"
      chapters:
        - how-much-is-enough.qmd
        - making-the-call.qmd
        - conviction.qmd
        - carrying-the-call.qmd

    - part: "Becoming"
      chapters:
        - calibration.qmd
        - cultivated-judgment.qmd
        - supervising-your-ai.qmd

    - further-reading.qmd

    - method-layer.qmd

    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    css:
      - base.css
      - custom_mtc.css
    number-sections: true
    number-depth: 1
    fig-cap-location: margin
    tbl-cap-location: margin

editor: source

execute:
  echo: false
  freeze: true
