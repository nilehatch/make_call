project:
  type: book
  output-dir: _book

book:
  title: "Make the Call"
  subtitle: "Knowing what you know, learning what you can, and acting under uncertainty in entrepreneurship"
  reader-mode: true

#  author: "Nile Hatch"
#  date: "9/4/2025"

  site-url: https://mc.nilehatch.com/
  repo-url: https://github.com/nilehatch/make_call/

  page-footer:
    left: |
      _Make the Call_ is written by Nile Hatch.
    right: |
      Built with <a href="https://quarto.org/">Quarto</a>.

  sidebar:
    style: "docked"
    collapse-level: 1

  chapters:
    - index.qmd
    - intro.qmd

    - part: "Part I · Into the Fog — the terrain and the method"
      chapters:
        - ch02-uncertainty.qmd
        - ch04-epistemology.qmd
        - ch03-knowledge.qmd
        - the-loop.qmd
        - why-the-fog-hurts.qmd

    - part: "Part II · Frame — what are we really deciding?"
      chapters:
        - ch08-urgent-unknowns.qmd
        - ch20-modeling.qmd
        - ch09-hypothesizing.qmd
        - ch10-exploring.qmd

    - part: "Part III · Prior — what you already believe (and why you can't ignore it)"
      chapters:
        - prior-you-have-one.qmd
        - prior-why-it-matters.qmd
        - seeing-probability.qmd
        - priors-small-world.qmd

    - part: "Part IV · Evidence — gather what exists, test what doesn't"
      chapters:
        - evidence-enough.qmd
        - gathering-whats-known.qmd
        - designing-the-experiment.qmd
        - seeing-in-depth.qmd

    - part: "Part V · Sense — is it credible, and what do you now believe?"
      chapters:
        - weighing-the-evidence.qmd
        - ch22-updating.qmd
        - ch06-update-revise.qmd

    - part: "Part VI · Call — is it enough, and which way?"
      chapters:
        - ch24-decision-rules.qmd
        - ch25-judgment.qmd
        - ch28-conviction.qmd
        - ch26-presenting.qmd

    - part: "Part VII · Becoming — someone who navigates the fog"
      chapters:
        - calibration.qmd
        - ch29-lifelong-learning.qmd
        - supervising-your-ai.qmd

    - part: "Companion · The Method Layer (for your AI)"
      chapters:
        - method-layer.qmd

    - part: "Holding · source drafts — pending compression, split, or retirement"
      chapters:
        - ch05-judgment.qmd
        - wrap1-knowing-revising.qmd
        - wrap2-asking-right-questions.qmd
        - ch13-public-data.qmd
        - ch14-private-data.qmd
        - ch15-customer-evidence.qmd
        - ch16-competitor-market-signals.qmd
        - ch17-human-experts.qmd
        - ch18-ai-amplifier.qmd
        - ch19-internal-data.qmd
        - ch23-evaluating.qmd
        - ch30-leadership.qmd
        - tk1-public-data.qmd
        - tk2-private-data.qmd
        - tk3-customer-data.qmd
        - tk4-customer-market-signals.qmd
        - tk5-internal-data.qmd

    - references.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    css:
      - base.css
      - custom_mtc.css
    number-sections: true
    number-depth: 1
    fig-cap-location: margin
    tbl-cap-location: margin

editor: source

execute:
  echo: false
